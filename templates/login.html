<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/main.css') }}"
    >
    <title>Document</title>
</head>
<body>
    <header>
        <nav>
            <div class = "logo_button">
                <a>
                    <img src = "" alt = "Logo"/>
                </a>

            </div>

        </nav>
    </header>

    <div class="login_signup">
        <h1>Login</h1>

        <div class="login_signup_box">
            <form action="{{ url_for('login') }}" method="POST" autocomplete="off">
                
                <label for="login_identifier">Username or email:</label><br>
                <input type="text" id="login_identifier" name="login_identifier" required>
                <br><br>
                
                <label for="password">Password:</label><br>
                <input type="password" id="password" name="password" required>
                <br><br>

                <button type="submit">Login</button>

                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}

                <p class="small_text">Don't have an account?<a href="{{ url_for('sign_up') }}">Sign up</a></p>
            </form>
        </div>


    </div>
</body>
</html>
