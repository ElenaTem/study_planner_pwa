<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/main.css') }}"
    >
</head>
<body>
    <header>
        <nav>
            <div class = "logo_button">
                <a>
                    <img src = "" alt = "Logo"/>
                </a>

            </div>

        
            <ul>
                <li><a href="{{ url_for('home') }}">Home</a></li>
                <li><a href="{{ url_for('calendar') }}">Calendar</a></li>
                <li><a href="{{ url_for('timer') }}">Study Session</a></li>
            </ul>

            <li class="acc"><a href="">Account</a></li>
            
        </nav>
    </header>

    <div class="main_timer_box">
        <div class="tree_scene" aria-hidden="true">
            <img
                id="studyTree"
                class="tree_image"
                src="{{ url_for('static', filename='images/tree_7.png') }}"
                alt=""
            >
    
            <img
                class="grass_image"
                src="{{ url_for('static', filename='images/grass.png') }}"
                alt=""
            >
        </div>
        
        <div class="time_picker_box">
            <h2>Customise Your Study Session</h2>


            <div class="duration-row">
                <p>Length Of Study Session:</p>
        
                <div class="time-control">
                    <div class="arrow-controls">
                        <button type="button" id="increaseHours" class="arrow-button" aria-label="Increase hours">
                            ▲
                        </button>
        
                        <button type="button" id="decreaseHours" class="arrow-button" aria-label="Decrease hours" >
                            ▼
                        </button>
                    </div>
        
                    <output id="hoursDisplay" class="time-display">
                        00
                    </output>
        
                    <span class="time-label">hrs</span>
                </div>


                
        
                <div class="time-control">
                    <div class="arrow-controls">

                        <button type="button" id="increaseMinutes" class="arrow-button" aria-label="Increase minutes">
                            ▲
                        </button>
                        
                        <button type="button" id="decreaseMinutes" class="arrow-button" aria-label="Decrease minutes" >
                            ▼
                        </button>
                    </div>
        
                    <output id="minutesDisplay" class="time-display">
                        30
                    </output>
        
                    <span class="time-label">mins</span>
                </div>
            </div>
            <button type="button" id="startStudyButton" class="start-study-button">
                Start Studying!
            </button>
        </div>
        
    </div>

    <script src="{{ url_for('static', filename='js/study_session.js') }}"></script>
</body>
</html>
